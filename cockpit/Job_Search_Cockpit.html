<style>
:root{--ink:#14171a;--sub:#5b636b;--faint:#8a929a;--line:#e3e6ea;--card:#fff;--bg:#f6f7f9;--accent:#22436e;
--track:#eef1f4;--hi:#b23a48;--med:#b9822a;--lo:#5b7089;
--green-b:#e7efe8;--green-t:#2f5a3a;--amber-b:#f5efe2;--amber-t:#6b5525;--red-b:#f6e7e8;--red-t:#8a2f38;
--blue-b:#e8eef6;--blue-t:#22436e;--grey-b:#eef0f2;--grey-t:#4a515a;--orange-b:#f5ece2;--orange-t:#6b4a25;--strong-b:#e7efe8;--strong-t:#2f5a3a}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45;padding:30px 26px}
.wrap{max-width:1120px;margin:0 auto}
.top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4px}
h1{font-size:20px;font-weight:650;margin:0;letter-spacing:-.01em}
.subh{color:var(--sub);font-size:12.5px;margin-top:3px}
.asof{color:var(--faint);font-size:11.5px;text-align:right}
nav{display:flex;gap:2px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin:14px 0 20px}
nav button{appearance:none;border:none;background:none;font:inherit;font-size:13px;color:var(--sub);padding:9px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
nav button.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab{display:none}.tab.on{display:block}
.chips{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.chip{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 14px}
.chip .l{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:600}
.chip .v{font-size:24px;font-weight:660;margin-top:4px;letter-spacing:-.02em}
.chip .d{font-size:11px;color:var(--sub);margin-top:1px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:16px}
.card h3{font-size:12.5px;font-weight:650;margin:0 0 4px}
.card .hint{font-size:11px;color:var(--faint);margin:0 0 14px}
.qgroup{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:600;margin:14px 0 7px}
.qgroup:first-child{margin-top:0}
.act{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid #f1f3f5}
.act:last-child{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:none}
.dot.high{background:var(--hi)}.dot.med{background:var(--med)}.dot.low{background:var(--lo)}
.act .t{font-size:13px;font-weight:550}.act .c{font-size:11.5px;color:var(--sub);margin-top:1px}
.tag{margin-left:auto;font-size:10px;font-weight:600;color:var(--faint);border:1px solid var(--line);border-radius:20px;padding:1px 8px;white-space:nowrap;align-self:center}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:0 10px 8px;border-bottom:1px solid var(--line)}
td{padding:9px 10px;border-bottom:1px solid #f1f3f5;vertical-align:middle}
tr:last-child td{border-bottom:none}
td .co{font-weight:600}td .ro{color:var(--sub);font-size:11px}
.pill{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.p-green{background:var(--green-b);color:var(--green-t)}.p-amber{background:var(--amber-b);color:var(--amber-t)}.p-red{background:var(--red-b);color:var(--red-t)}
.p-blue{background:var(--blue-b);color:var(--blue-t)}.p-grey{background:var(--grey-b);color:var(--grey-t)}.p-orange{background:var(--orange-b);color:var(--orange-t)}.p-strong{background:var(--strong-b);color:var(--strong-t)}
.tgt{display:grid;grid-template-columns:150px 1fr 78px;align-items:center;gap:12px;margin:12px 0}
.tgt .lab{font-size:12.5px;font-weight:550}
.tgt .bar{background:var(--track);border-radius:6px;height:10px;overflow:hidden}
.tgt .fill{height:100%;border-radius:6px;background:var(--accent)}.tgt .fill.under{background:var(--med)}
.tgt .num{font-size:12px;color:var(--sub);text-align:right}.tgt .num b{color:var(--ink);font-weight:650}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){.split{grid-template-columns:1fr}.chips{grid-template-columns:repeat(2,1fr)}}
.gate{background:#fbf9f3;border:1px solid #ece2c9;border-radius:10px;padding:11px 13px;font-size:12px;color:#5c5023;margin-bottom:14px}
.frow{display:grid;grid-template-columns:96px 1fr 80px;align-items:center;gap:12px;margin:8px 0}
.fstage{font-size:12px;font-weight:550;text-align:right}
.ftrack{background:var(--track);border-radius:7px;height:26px;overflow:hidden}
.fbar{background:var(--accent);height:100%;border-radius:7px;display:flex;align-items:center;justify-content:flex-end;min-width:32px}
.fbar span{color:#fff;font-size:11.5px;font-weight:600;padding-right:9px}.fbar.zero{background:#c8ced6}
.fconv{font-size:11px;color:var(--sub)}.fconv b{color:var(--ink)}
.mini{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f1f3f5;font-size:12.5px}.mini:last-child{border-bottom:none}.mini .n{font-weight:650}
.bbar{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.bbar button{appearance:none;font:inherit;font-size:12px;font-weight:550;color:var(--accent);background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 12px;cursor:pointer}
.bbar button:hover{background:#f0f3f7}
.bbar .legend{margin-left:auto;display:flex;gap:12px;font-size:11px;color:var(--sub);align-items:center}
.bbar .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:-1px}
.saved{font-size:11px;color:var(--green-t);opacity:0;transition:opacity .3s}.saved.on{opacity:1}
.board{display:flex;gap:11px;overflow-x:auto;padding:2px 0 14px;align-items:flex-start}
.col{background:#eef0f3;border:1px solid var(--line);border-radius:12px;width:216px;flex:none;padding:9px;min-height:110px}
.col.over{background:#e3e9f1;border-color:#b9c6d8}
.colhead{display:flex;justify-content:space-between;align-items:center;padding:2px 4px 9px}
.colhead .n{font-size:12px;font-weight:650}
.colhead .ct{font-size:11px;color:var(--faint);font-weight:600;background:#fff;border:1px solid var(--line);border-radius:20px;padding:0 8px}
.kcard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 11px;margin-bottom:8px;cursor:grab;box-shadow:0 1px 2px rgba(20,23,26,.04)}
.kcard.drag{opacity:.5}
.kcard .kco{font-size:12px;font-weight:650}.kcard .kro{font-size:10.5px;color:var(--sub);margin-top:1px}
.kcard .krow{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:8px}
.src{font-size:9.5px;color:var(--faint);border:1px solid var(--line);border-radius:20px;padding:1px 7px}
footer{color:var(--faint);font-size:10.5px;margin-top:6px;line-height:1.5}
</style></head>
<body><div class="wrap">
  <div class="top"><div><h1>Job Search — Cockpit</h1><div class="subh" id="c_sub"></div></div><div class="asof" id="c_asof"></div></div>
  <nav id="c_nav"></nav>
  <div class="tab on" data-tab="today" id="t_today"></div>
  <div class="tab" data-tab="board" id="t_board"></div>
  <div class="tab" data-tab="pipeline" id="t_pipeline"></div>
  <div class="tab" data-tab="outreach" id="t_outreach"></div>
  <div class="tab" data-tab="performance" id="t_perf"></div>
  <div class="tab" data-tab="effectiveness" id="t_eff"></div>
  <div class="tab" data-tab="overview" id="t_over"></div>
  <footer id="c_foot"></footer>
</div>
<script>
// ---- Demo data. Replace CFG/D/SEED with your own (or let setup seed them). ----
// STATE MODEL: the FILE is the source of truth. SEED / D / CFG are rewritten by the scheduled run.
// localStorage holds ONLY card moves the run has not yet folded into your application log.
// On load we start from SEED, then re-apply pending moves via a three-way merge (see load()).
const PKEY="cockpit_pending_v2";
try{localStorage.removeItem("cockpit_state_v1");}catch(e){} // retire the old full-state cache that shadowed run updates
const isoDate=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
// No hardcoded dates: today and the week start are derived from the system clock (week starts Monday).
const CFG=(()=>{const d=new Date();const ws=new Date(d);ws.setDate(d.getDate()-((d.getDay()+6)%7));return{today:isoDate(d),weekStart:isoDate(ws)};})();
const STAGES=[
 {id:"sourced",name:"Sourced",rank:0},
 {id:"applying",name:"Applying",rank:1},
 {id:"applied",name:"Applied",rank:2,amber:7,red:10},
 {id:"screen",name:"Screening",rank:3,amber:7,red:14},
 {id:"interview",name:"Interview",rank:4,amber:10,red:21},
 {id:"offer",name:"Offer",rank:5},
 {id:"closed",name:"Closed",rank:6}
];
const D={scanned:0,targets:{applicationsPerWeek:8,outreachPerWeek:5},
 recruiters:[
  {firm:"Executive Search Firm A",channel:"LinkedIn + submit profile",due:"2026-01-18",status:"Not started"},
  {firm:"Executive Search Firm B",channel:"LinkedIn",due:"2026-01-20",status:"Not started"}],
 network:[
  {name:"Former manager",context:"Prior employer",status:"Draft ready"},
  {name:"Industry peer",context:"Conference contact",status:"Draft ready"}],
 setup:[{title:"Enable mail confirmation checks",ctx:"Optional: verify application confirmations automatically",done:false}]};
const SEED={updated:"2026-01-15",updatedAt:"2026-01-15T00:00:00Z",cards:[
 {id:"acme",company:"Acme AI",role:"Director, AI Product",fit:"Strong",track:"R1",variant:"V1",source:"Greenhouse",col:"applied",enteredAt:"2026-01-15",createdAt:"2026-01-15"},
 {id:"globex",company:"Globex",role:"Senior PM, Governance",fit:"Good",track:"R2",variant:"V2",source:"Lever",col:"applied",enteredAt:"2026-01-15",createdAt:"2026-01-15"},
 {id:"initech",company:"Initech",role:"AI Program Manager",fit:"Moderate",track:"R3",variant:"V3",source:"Ashby",col:"screen",enteredAt:"2026-01-15",createdAt:"2026-01-13"},
 {id:"umbrella",company:"Umbrella Corp",role:"Head of Responsible AI",fit:"Good",track:"R1",variant:"V1",source:"Indeed",col:"applying",enteredAt:"2026-01-15",createdAt:"2026-01-15",flag:"On hold — account wall"}]};
function readPending(){try{const s=localStorage.getItem(PKEY);return s?JSON.parse(s):[];}catch(e){return [];}}
function writePending(p){try{localStorage.setItem(PKEY,JSON.stringify(p));}catch(e){}}
// Three-way merge (base = what the file said when the move was made, local = the move, remote = the file now).
// A local move is kept until the FILE actually agrees with it - not until some timestamp passes.
// This is what stops a run from silently eating a move it never knew about.
function load(){
 const base=JSON.parse(JSON.stringify(SEED));
 const keep=[];
 readPending().forEach(m=>{
  const c=base.cards.find(x=>x.id===m.id);
  if(!c)return;                 // card no longer in the file -> drop the move
  if(c.col===m.to)return;       // the run has logged this move -> it retires itself
  if(c.col!==m.base)return;     // the run has newer authoritative state for this card -> the run wins
  const st=STAGES.find(s=>s.id===m.to);
  c.history=(c.history||[]).concat([{from:m.base,to:m.to,at:m.atDate}]);
  c.col=m.to;c.enteredAt=m.atDate;c.status=st?st.name:m.to;
  if(m.to!=="applying"&&c.flag&&c.flag.indexOf("On hold")>-1)delete c.flag;
  keep.push(m);
 });
 writePending(keep);
 return base;
}
function save(){const s=document.getElementById('c_saved');if(s){s.classList.add('on');setTimeout(()=>s.classList.remove('on'),900);}}
let STATE=load();let dragging=false;
let currentTab=(()=>{try{return sessionStorage.getItem('cockpit_tab')||"today";}catch(e){return "today";}})();
const g=id=>document.getElementById(id);
const stage=id=>STAGES.find(s=>s.id===id);
const pd=s=>{const p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);};
const todayISO=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
const daysSince=iso=>Math.max(0,Math.floor((new Date()-pd(iso))/86400000));
const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const fmt=s=>{const d=pd(s);return M[d.getMonth()]+" "+d.getDate();};
const dLeft=s=>Math.round((pd(s)-pd(CFG.today))/86400000);
const fitCls=f=>({Strong:'p-strong',Good:'p-blue',Moderate:'p-grey',Stretch:'p-orange'}[f]||'p-grey');
const active=()=>STATE.cards.filter(c=>c.col!=="closed");
const atOrPast=r=>STATE.cards.filter(c=>c.col!=="closed"&&stage(c.col).rank>=r);
const appliedCards=()=>atOrPast(2);
const appliedThisWeek=()=>appliedCards().filter(c=>pd(c.createdAt)>=pd(CFG.weekStart)).length;
const outreachSent=()=>D.recruiters.filter(r=>r.status!=="Not started").length+D.network.filter(n=>n.status!=="Draft ready").length;
function slaOf(card){const st=stage(card.col);const d=daysSince(card.enteredAt);if(st.red&&d>=st.red)return{k:"red",lab:"Stale — nudge",d};if(st.amber&&d>=st.amber)return{k:"amber",lab:"Follow up",d};if(st.amber)return{k:"green",lab:"In window",d};return{k:"grey",lab:"—",d};}
function ageBadge(card){const s=slaOf(card);const cls={red:"p-red",amber:"p-amber",green:"p-green",grey:"p-grey"}[s.k];return `<span class="pill ${cls}">${s.d}d in ${stage(card.col).name}</span>`;}
function actions(){const it=[];
 D.recruiters.forEach(r=>{if(r.status==="Not started"){const dl=dLeft(r.due);it.push({pri:dl<0?"high":(dl<=3?"med":"low"),t:"Contact "+r.firm,c:"Recruiter · due "+fmt(r.due)+" · "+r.channel,grp:dl<0?"Overdue":(dl<=0?"Today":(dl<=7?"This week":"Upcoming")),sort:dl,tag:"Outreach"});}});
 STATE.cards.forEach(c=>{if(c.col==="applied"){const s=slaOf(c);if(s.k==="red")it.push({pri:"high",t:"Follow up or close: "+c.company,c:s.d+"d silent since applying",grp:"Overdue",sort:-99,tag:"Follow-up"});else if(s.k==="amber")it.push({pri:"med",t:"Follow up: "+c.company,c:s.d+"d since applying",grp:"This week",sort:3,tag:"Follow-up"});}});
 STATE.cards.forEach(c=>{if(c.flag&&c.flag.indexOf("On hold")>-1)it.push({pri:"med",t:"Decide route: "+c.company,c:"Account wall · apply direct or drop",grp:"This week",sort:4,tag:"Decision"});});
 D.network.forEach(n=>{if(n.status==="Draft ready")it.push({pri:"low",t:"Send note to "+n.name,c:n.context+" · draft ready",grp:"This week",sort:6,tag:"Network"});});
 D.setup.forEach(s=>{if(!s.done)it.push({pri:"low",t:s.title,c:s.ctx,grp:"Backlog",sort:9,tag:"Setup"});});
 return it;}
function renderToday(){const it=actions();const order=["Overdue","Today","This week","Upcoming","Backlog"];
 const dueSoon=it.filter(x=>["Overdue","Today","This week"].includes(x.grp)).length;
 const stale=STATE.cards.filter(c=>c.col==="applied"&&slaOf(c).k==="red").length;
 const chips=[["Open actions",it.length,"across all types"],["Due this week",dueSoon,"needs attention"],["Stale applications",stale,"past SLA, no response"],["Applied this week",appliedThisWeek()+" / "+D.targets.applicationsPerWeek,"vs weekly target"]];
 let h='<div class="chips">'+chips.map(c=>`<div class="chip"><div class="l">${c[0]}</div><div class="v">${c[1]}</div><div class="d">${c[2]}</div></div>`).join('')+'</div><div class="card"><h3>Action queue</h3><p class="hint">Work top to bottom. Red = do now, amber = this week, blue = when you can.</p>';
 order.forEach(grp=>{const rows=it.filter(x=>x.grp===grp).sort((a,b)=>a.sort-b.sort);if(!rows.length)return;h+=`<div class="qgroup">${grp}</div>`+rows.map(r=>`<div class="act"><span class="dot ${r.pri}"></span><div><div class="t">${r.t}</div><div class="c">${r.c}</div></div><span class="tag">${r.tag}</span></div>`).join('');});
 g('t_today').innerHTML=h+'</div>';}
function renderBoard(){
 let h='<div class="bbar"><button id="c_export">Export board_data.json</button><button id="c_reset">Discard un-logged moves</button><span class="saved" id="c_saved">Saved</span><div class="legend"><span><i style="background:#e7efe8"></i>in window</span><span><i style="background:#f5efe2"></i>follow up</span><span><i style="background:#f6e7e8"></i>stale</span></div></div><div class="board" id="c_board"></div>';
 g('t_board').innerHTML=h;const b=g('c_board');
 STAGES.forEach(st=>{const cards=STATE.cards.filter(c=>c.col===st.id);const el=document.createElement('div');el.className='col';
  el.innerHTML=`<div class="colhead"><span class="n">${st.name}</span><span class="ct">${cards.length}</span></div>`;
  cards.forEach(card=>{const c=document.createElement('div');c.className='kcard';c.draggable=true;
   c.innerHTML=`<div class="kco">${card.company}</div><div class="kro">${card.role}</div><div class="krow"><span class="pill ${fitCls(card.fit)}">${card.fit}</span><span class="src">${card.source}</span>${ageBadge(card)}${card.flag?`<span class="pill p-amber">${card.flag}</span>`:''}</div>`;
   c.addEventListener('dragstart',e=>{dragging=true;e.dataTransfer.setData('text/plain',card.id);c.classList.add('drag');});
   c.addEventListener('dragend',()=>{dragging=false;c.classList.remove('drag');});el.appendChild(c);});
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('over');});
  el.addEventListener('dragleave',()=>el.classList.remove('over'));
  el.addEventListener('drop',e=>{e.preventDefault();dragging=false;el.classList.remove('over');moveCard(e.dataTransfer.getData('text/plain'),st.id);});
  b.appendChild(el);});
 g('c_export').addEventListener('click',()=>{const out={updated:todayISO(),cards:STATE.cards.map(c=>({company:c.company,role:c.role,status:stage(c.col).name,column:c.col,fit:c.fit,source:c.source,enteredAt:c.enteredAt,createdAt:c.createdAt,daysInColumn:daysSince(c.enteredAt),flag:c.flag||null,history:c.history||[]}))};const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download="board_data.json";a.click();});
 g('c_reset').addEventListener('click',()=>{const p=readPending();
  if(!p.length){alert("Nothing to discard. The board already matches what the last run wrote.");return;}
  if(confirm("Discard "+p.length+" move(s) not yet in your application log, and show exactly what the last run wrote?")){writePending([]);STATE=load();render();}});}
function moveCard(id,toCol){const card=STATE.cards.find(c=>c.id===id);if(!card||card.col===toCol)return;
 const from=card.col,d=todayISO();
 const seedCard=SEED.cards.find(c=>c.id===id);
 const p=readPending();const ex=p.find(m=>m.id===id);
 if(ex){ex.to=toCol;ex.at=new Date().toISOString();ex.atDate=d;}
 else p.push({id,base:seedCard?seedCard.col:from,from,to:toCol,at:new Date().toISOString(),atDate:d});
 writePending(p.filter(m=>{const sc=SEED.cards.find(c=>c.id===m.id);return !(sc&&sc.col===m.to);}));
 card.history=card.history||[];card.history.push({from,to:toCol,at:d});
 card.col=toCol;card.enteredAt=d;card.status=stage(toCol).name;
 if(toCol!=="applying"&&card.flag&&card.flag.indexOf("On hold")>-1)delete card.flag;
 save();render();}
// Derived, not hardcoded: applied date and first-response date come from history[].
const appliedAt=c=>{const h=(c.history||[]).find(x=>x.to==="applied");return h?h.at:(stage(c.col).rank>=2?c.createdAt:null);};
const respAt=c=>{const h=(c.history||[]).find(x=>{const s=stage(x.to);return s&&s.rank>=3;});return h?h.at:null;};
function avgDaysToResponse(){const ds=STATE.cards.map(c=>{const a=appliedAt(c),r=respAt(c);if(!a||!r)return null;return Math.max(0,Math.round((pd(r)-pd(a))/86400000));}).filter(x=>x!==null);
 return ds.length?{n:ds.length,avg:Math.round(ds.reduce((s,x)=>s+x,0)/ds.length)}:null;}
function renderPipeline(){let h='<div class="card"><h3>Active pipeline — aging & SLA</h3><p class="hint">Days = time in current stage. Anything past SLA surfaces as an action on the Today tab. Move cards on the Board tab; this updates live.</p><table><thead><tr><th>Company</th><th>Role</th><th>Stage</th><th>In stage</th><th>SLA</th><th>Next action</th></tr></thead><tbody>';
 const ac=active();if(!ac.length)h+='<tr><td colspan="6" class="ro">No active applications.</td></tr>';
 ac.forEach(c=>{const s=slaOf(c);const stp={red:"p-red",amber:"p-amber",green:"p-green",grey:"p-grey"}[s.k];const stageCls=c.col==="applied"?"p-blue":(c.col==="offer"?"p-green":(c.flag?"p-orange":"p-grey"));const nxt=s.k==="red"?"Follow up or close":s.k==="amber"?"Follow up":c.flag?"Decide: apply direct or drop":"Advance / await";h+=`<tr><td><span class="co">${c.company}</span></td><td class="ro">${c.role}</td><td><span class="pill ${stageCls}">${stage(c.col).name}</span></td><td>${s.d}d</td><td><span class="pill ${stp}">${s.lab}</span></td><td class="ro">${nxt}</td></tr>`;});
 g('t_pipeline').innerHTML=h+'</tbody></table></div>';}
function renderOutreach(){let h='<div class="chips" style="grid-template-columns:repeat(2,1fr)"><div class="chip"><div class="l">Outreach sent this week</div><div class="v">'+outreachSent()+' / '+D.targets.outreachPerWeek+'</div><div class="d">recruiters + network</div></div><div class="chip"><div class="l">Recruiter firms engaged</div><div class="v">'+D.recruiters.filter(r=>r.status!=="Not started").length+' / '+D.recruiters.length+'</div><div class="d">employer-paid, free</div></div></div>';
 h+='<div class="card"><h3>Executive recruiters</h3><p class="hint">Employer-paid, so free to you. Named leads where identified.</p><table><thead><tr><th>Firm</th><th>Contact / channel</th><th>Due</th><th>Status</th></tr></thead><tbody>';
 D.recruiters.forEach(r=>{const dl=dLeft(r.due);const stp=r.status!=="Not started"?"p-green":(dl<0?"p-red":(dl<=3?"p-amber":"p-grey"));h+=`<tr><td class="co">${r.firm}</td><td class="ro">${r.channel}</td><td>${fmt(r.due)}</td><td><span class="pill ${stp}">${r.status}</span></td></tr>`;});
 h+='</tbody></table></div><div class="card"><h3>Warm network</h3><p class="hint">Personalize each note; warm intros are your highest-conversion channel.</p><table><thead><tr><th>Contact</th><th>Context</th><th>Status</th></tr></thead><tbody>';
 D.network.forEach(n=>{h+=`<tr><td class="co">${n.name}</td><td class="ro">${n.context}</td><td><span class="pill ${n.status!=="Draft ready"?"p-green":"p-grey"}">${n.status}</span></td></tr>`;});
 g('t_outreach').innerHTML=h+'</tbody></table></div>';}
function renderPerf(){const rows=[["Applications this week",appliedThisWeek(),D.targets.applicationsPerWeek],["Outreach this week",outreachSent(),D.targets.outreachPerWeek]];
 const ar=avgDaysToResponse();const respTxt=ar?ar.avg+"d":"No screens yet";
 let h='<div class="card"><h3>Leading indicators — this week vs target</h3><p class="hint">The inputs you control. Hit these and outcomes follow.</p>';
 rows.forEach(r=>{const pct=Math.min(r[1]/r[2]*100,100);const under=r[1]<r[2];h+=`<div class="tgt"><div class="lab">${r[0]}</div><div class="bar"><div class="fill ${under?'under':''}" style="width:${pct}%"></div></div><div class="num"><b>${r[1]}</b> / ${r[2]}</div></div>`;});
 h+='</div><div class="split"><div class="card"><h3>Velocity</h3><div class="mini"><span>Applications this week</span><span class="n">'+appliedThisWeek()+'</span></div><div class="mini"><span>Cumulative applied</span><span class="n">'+appliedCards().length+'</span></div><div class="mini"><span>Roles scanned</span><span class="n">'+D.scanned+'</span></div></div><div class="card"><h3>Responsiveness</h3><div class="mini"><span>Avg days to first response</span><span class="n">'+respTxt+'</span></div><div class="mini"><span>Screens booked</span><span class="n">'+atOrPast(3).length+'</span></div><div class="mini"><span>Response rate</span><span class="n">'+(appliedCards().length?Math.round(atOrPast(3).length/appliedCards().length*100)+"%":"—")+'</span></div><p class="hint" style="margin-top:10px">Screens/response rate update as you advance cards on the Board.</p></div></div>';
 g('t_perf').innerHTML=h;}
function renderEff(){const by=k=>{const m={};STATE.cards.forEach(a=>{m[a[k]]=(m[a[k]]||0)+1;});return m;};
 const tbl=(t,o)=>{let r='<div class="card"><h3>'+t+'</h3><table><tbody>';Object.keys(o).forEach(k=>{r+=`<tr><td>${k}</td><td style="text-align:right" class="n"><b>${o[k]}</b></td></tr>`;});return r+'</tbody></table></div>';};
 let h='<div class="gate"><b>Directional only.</b> Conversion cuts (which fit / track / source / variant convert to screens) need volume — they activate around 15+ applications. Current: '+appliedCards().length+' applied. Below is the current distribution: useful for spotting concentration, not yet conclusions.</div><div class="split">'+tbl("By fit rating",by("fit"))+tbl("By source",by("source"))+'</div><div class="split">'+tbl("By track (role code)",by("track"))+tbl("By resume variant",by("variant"))+'</div>';
 g('t_eff').innerHTML=h;}
function renderOver(){const funnel=[{s:"In pipeline",n:active().length},{s:"Applied",n:appliedCards().length},{s:"Screen",n:atOrPast(3).length},{s:"Interview",n:atOrPast(4).length},{s:"Offer",n:atOrPast(5).length}];
 const mx=Math.max(...funnel.map(f=>f.n),1);const rr=appliedCards().length?Math.round(atOrPast(3).length/appliedCards().length*100)+"%":"—";
 let h='<div class="chips"><div class="chip"><div class="l">Roles scanned</div><div class="v">'+D.scanned+'</div><div class="d">discovery pool</div></div><div class="chip"><div class="l">Applied</div><div class="v">'+appliedCards().length+'</div><div class="d">active</div></div><div class="chip"><div class="l">In pipeline</div><div class="v">'+active().length+'</div><div class="d">not closed</div></div><div class="chip"><div class="l">Response rate</div><div class="v">'+rr+'</div><div class="d">screens ÷ applied</div></div></div><div class="card"><h3>Conversion funnel</h3>';
 funnel.forEach((f,i)=>{const w=Math.max(f.n/mx*100,f.n===0?6:12);const p=i>0?funnel[i-1].n:null;const c=(i>0&&p>0)?Math.round(f.n/p*100)+"%":(i>0?"—":"top");h+=`<div class="frow"><div class="fstage">${f.s}</div><div class="ftrack"><div class="fbar ${f.n===0?'zero':''}" style="width:${w}%"><span>${f.n}</span></div></div><div class="fconv">${i>0?'<b>'+c+'</b> of prior':'top of funnel'}</div></div>`;});
 g('t_over').innerHTML=h+'</div>';}
function render(){renderToday();renderBoard();renderPipeline();renderOutreach();renderPerf();renderEff();renderOver();applyTab();}
function applyTab(){document.querySelectorAll('nav button').forEach(x=>x.classList.toggle('on',x.dataset.t===currentTab));document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.tab===currentTab));}
const tabs=[["today","Today"],["board","Board"],["pipeline","Pipeline"],["outreach","Outreach"],["performance","Performance"],["effectiveness","Effectiveness"],["overview","Overview"]];
g('c_nav').innerHTML=tabs.map((t,i)=>`<button data-t="${t[0]}" class="${i===0?'on':''}">${t[1]}</button>`).join('');
g('c_nav').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;currentTab=b.dataset.t;try{sessionStorage.setItem('cockpit_tab',currentTab);}catch(e2){}applyTab();});
g('c_sub').textContent="Action cockpit · drag cards on Board to update every tab · demo data — replace SEED";
g('c_asof').innerHTML="As of "+fmt(CFG.today)+"<br>Refreshed each run";
const pendN=readPending().length;
g('c_foot').innerHTML="The file is the source of truth: each scheduled run rewrites this cockpit, and the page auto-refreshes so you always see the latest. Card moves you make are held locally until a run folds them into your application log, then they retire themselves"+(pendN?" (currently "+pendN+" un-logged)":"")+". Export board_data.json to reconcile. Recruiters and network live in Outreach (not on the applications board by design). Configure excluded companies in config.json.";
// AUTO-REFRESH: the scheduled run rewrites this file. Pull the new state in without a manual reload.
const loadedAt=Date.now();
const autoRefresh=()=>{if(document.hidden||dragging)return;if(Date.now()-loadedAt<15000)return;location.reload();};
window.addEventListener('focus',autoRefresh);
document.addEventListener('visibilitychange',autoRefresh);
setInterval(()=>{if(!document.hidden&&!dragging)location.reload();},300000);
render();
</script></body></html>
